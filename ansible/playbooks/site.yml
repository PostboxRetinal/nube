# =============================================================================
# Main Site Playbook - Orchestrates All Configuration
# =============================================================================

---
- name: Apply common configuration to all hosts
  hosts: all
  gather_facts: true
  become: true
  
  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        connect_timeout: 10
        sleep: 5
        delay: 5
        timeout: 300

    - name: Gather facts
      setup:
        gather_subset:
          - "!all"
          - "!min"
          - network
          - hardware
          - virtual

  roles:
    - role: common
      tags:
        - common
        - always


- name: Configure microservices host with Docker
  hosts: microservices
  gather_facts: true
  become: true
  
  roles:
    - role: docker
      tags:
        - docker
        - microservices

    - role: microservices
      tags:
        - microservices


- name: Configure HAProxy load balancer
  hosts: haproxy
  gather_facts: true
  become: true
  
  roles:
    - role: haproxy
      tags:
        - haproxy


- name: Verify infrastructure deployment
  hosts: all
  gather_facts: false
  become: false
  
  tasks:
    - name: Verify connectivity to all nodes
      command: "ping -c 2 {{ item }}"
      loop:
        - "{{ control_node_ip }}"
        - "{{ haproxy_ip }}"
        - "{{ microservices_ip }}"
      changed_when: false
      ignore_errors: true
      tags:
        - verify
        - never


- name: Verify HAProxy routing
  hosts: haproxy
  gather_facts: false
  become: false
  
  tasks:
    - name: Wait for HAProxy to be ready
      wait_for:
        port: "{{ haproxy_frontend_port }}"
        delay: 5
        timeout: 60
      tags:
        - verify
        - never

    - name: Test API endpoints via HAProxy
      uri:
        url: "http://localhost/api/{{ item }}/"
        method: GET
        status_code: 200
        return_content: true
      register: site_route_checks
      loop:
        - users
        - products
        - orders

    - name: Assert each API route returns expected service payload
      assert:
        that:
          - "item.json is defined"
          - "item.json is not string"
        fail_msg: "Route /api/{{ item.item }}/ did not return a valid JSON payload"
      loop: "{{ site_route_checks.results }}"
      tags:
        - verify
        - never
