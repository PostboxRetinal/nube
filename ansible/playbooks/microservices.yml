# =============================================================================
# Microservices Playbook
# =============================================================================

---
- name: Configure Microservices Host
  hosts: microservices
  gather_facts: true
  become: true

  pre_tasks:
    - name: Wait for system to be ready
      wait_for_connection:
        timeout: 300

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - role: common
      tags:
        - common

    - role: docker
      tags:
        - docker

    - role: microservices
      tags:
        - microservices

  post_tasks:
    - name: Verify Docker is running
      service:
        name: docker
        state: started
      check_mode: true
      
    - name: List running containers
      command: docker ps --format "table {{'{{'}}.Names{{'}}'}}\t{{'{{'}}.Status{{'}}'}}\t{{'{{'}}.Ports{{'}}'}}"
      register: docker_ps_output
      changed_when: false

    - name: Display running containers
      debug:
        var: docker_ps_output.stdout_lines

    - name: Verify microservices ports are listening
      wait_for:
        port: "{{ item }}"
        timeout: 30
      loop:
        - 3001
        - 3002
        - 3003
        - 3011
        - 3012
        - 3013
      ignore_errors: true