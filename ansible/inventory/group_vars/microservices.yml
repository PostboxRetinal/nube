# =============================================================================
# Microservices Group Variables
# =============================================================================

---
# Docker Configuration
docker_edition: "ce"
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service: docker
docker_users:
  - vagrant

# Docker Compose Configuration
docker_compose_version: "2.24.0"

# Docker Network
docker_network_name: "microservices-net"
docker_network_driver: "bridge"

# Microservices Definition
# Each service runs two instances for load balancing demonstration
microservices_config:
  users:
    name: "users-service"
    image: "nginx:alpine"
    instances:
      - container_name: "users-service-1"
        port: 3001
      - container_name: "users-service-2"
        port: 3011
    environment:
      SERVICE_NAME: "users-service"
    restart_policy: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: "10s"
      timeout: "5s"
      retries: 3

  products:
    name: "products-service"
    image: "nginx:alpine"
    instances:
      - container_name: "products-service-1"
        port: 3002
      - container_name: "products-service-2"
        port: 3012
    environment:
      SERVICE_NAME: "products-service"
    restart_policy: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: "10s"
      timeout: "5s"
      retries: 3

  orders:
    name: "orders-service"
    image: "nginx:alpine"
    instances:
      - container_name: "orders-service-1"
        port: 3003
      - container_name: "orders-service-2"
        port: 3013
    environment:
      SERVICE_NAME: "orders-service"
    restart_policy: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: "10s"
      timeout: "5s"
      retries: 3