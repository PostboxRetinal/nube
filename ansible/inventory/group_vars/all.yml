# =============================================================================
# Global Variables for All Hosts
# =============================================================================

---
# System Configuration
timezone: UTC
locale: en_US.UTF-8

# SSH Configuration
ssh_port: 22

# Network Configuration
network_prefix: "192.168.56"
control_node_ip: "192.168.56.10"
haproxy_ip: "{{ hostvars['vm-haproxy'].ansible_host | default('192.168.56.20') }}"
microservices_ip: "{{ hostvars['vm-microservices'].ansible_host | default('192.168.56.30') }}"

# Common Packages
common_packages:
  - curl
  - wget
  - vim
  - htop
  - net-tools
  - jq
  - python3
  - python3-pip
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common