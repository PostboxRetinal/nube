# =============================================================================
# Common Role - Tasks
# =============================================================================

---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: safe
  when: false  # Disabled for faster provisioning

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Configure hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with cluster nodes
  lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.name }}"
    state: present
  loop:
    - { ip: "{{ control_node_ip }}", name: "control-node" }
    - { ip: "{{ haproxy_ip }}", name: "vm-haproxy" }
    - { ip: "{{ microservices_ip }}", name: "vm-microservices" }

- name: Ensure SSH directory exists
  file:
    path: /home/vagrant/.ssh
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0700'

- name: Disable SSH password authentication (optional)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    state: present
  notify: Restart SSH
  when: false  # Keep password auth for debugging

- name: Ensure vagrant user can sudo without password
  lineinfile:
    path: /etc/sudoers.d/vagrant
    line: 'vagrant ALL=(ALL) NOPASSWD:ALL'
    state: present
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'