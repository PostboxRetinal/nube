# =============================================================================
# Docker Role - Default Variables
# =============================================================================

---
docker_edition: "ce"

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service: docker

docker_users:
  - vagrant

docker_daemon_options:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: "overlay2"