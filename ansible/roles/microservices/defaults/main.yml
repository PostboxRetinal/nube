# =============================================================================
# Microservices Role - Default Variables
# =============================================================================

---
docker_compose_dir: /home/vagrant/microservices
docker_network_name: microservices-net

# MySQL cold-start tuning (used because deployment runs with `docker compose down -v`)
mysql_health_interval: 10s
mysql_health_timeout: 5s
mysql_health_retries: 30
mysql_health_start_period: 300s
