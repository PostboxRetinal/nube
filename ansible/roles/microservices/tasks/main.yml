# =============================================================================
# Microservices Role - Tasks
# =============================================================================

---
- name: Create microservices directory
  file:
    path: "{{ docker_compose_dir }}"
    state: directory
    mode: '0755'
    owner: vagrant
    group: vagrant

- name: Copy SQL init scripts
  copy:
    src: "files/init-{{ item }}-db.sql"
    dest: "{{ docker_compose_dir }}/init-{{ item }}-db.sql"
    mode: '0644'
  loop:
    - users
    - products
    - orders

- name: Deploy Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: vagrant
    group: vagrant
  notify: Restart microservices

- name: Create Docker network
  docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: Force pull updated microservices images
  docker_image:
    name: "{{ item.value.image }}"
    source: pull
    force_source: true
  loop: "{{ microservices_config | dict2items }}"

- name: Stop and remove existing containers
  shell: |
    docker compose -f {{ docker_compose_dir }}/docker-compose.yml down -v --remove-orphans || true
  args:
    executable: /bin/bash

- name: Start database containers with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    remove_orphans: true
    services:
      - users-db
      - products-db
      - orders-db
  register: compose_db_output

- name: Display database compose output
  debug:
    var: compose_db_output
  when: compose_db_output is defined

- name: Wait for users-db to be ready
  shell: |
    for i in $(seq 1 30); do
      docker exec users-db sh -c "mysqladmin ping -h 127.0.0.1 --protocol=TCP -uroot -proot --silent" 2>/dev/null && exit 0
      echo "Waiting for users-db to be ready... attempt $i"
      sleep 5
    done
    exit 1
  args:
    executable: /bin/bash
  register: usersdb_check
  retries: 3
  delay: 5
  until: usersdb_check.rc == 0
  changed_when: false

- name: Wait for products-db to be ready
  shell: |
    for i in $(seq 1 30); do
      docker exec products-db sh -c "mysqladmin ping -h 127.0.0.1 --protocol=TCP -uroot -proot --silent" 2>/dev/null && exit 0
      echo "Waiting for products-db to be ready... attempt $i"
      sleep 5
    done
    exit 1
  args:
    executable: /bin/bash
  register: productsdb_check
  retries: 3
  delay: 5
  until: productsdb_check.rc == 0
  changed_when: false

- name: Wait for orders-db to be ready
  shell: |
    for i in $(seq 1 30); do
      docker exec orders-db sh -c "mysqladmin ping -h 127.0.0.1 --protocol=TCP -uroot -proot --silent" 2>/dev/null && exit 0
      echo "Waiting for orders-db to be ready... attempt $i"
      sleep 5
    done
    exit 1
  args:
    executable: /bin/bash
  register: ordersdb_check
  retries: 3
  delay: 5
  until: ordersdb_check.rc == 0
  changed_when: false

- name: Verify tables exist in users-db
  shell: |
    TABLES=$(docker exec users-db sh -c "mysql -uroot -proot users-db -e 'SHOW TABLES'" 2>/dev/null)
    echo "$TABLES"
    if echo "$TABLES" | grep -q "users"; then
      echo "Users table already exists"
    else
      echo "Creating users table..."
      docker exec -i users-db sh -c "mysql -uroot -proot users-db" < {{ docker_compose_dir }}/init-users-db.sql
    fi
  register: usersdb_tables
  failed_when: false

- name: Verify tables exist in products-db
  shell: |
    TABLES=$(docker exec products-db sh -c "mysql -uroot -proot products-db -e 'SHOW TABLES'" 2>/dev/null)
    echo "$TABLES"
    if echo "$TABLES" | grep -q "products"; then
      echo "Products table already exists"
    else
      echo "Creating products table..."
      docker exec -i products-db sh -c "mysql -uroot -proot products-db" < {{ docker_compose_dir }}/init-products-db.sql
    fi
  register: productsdb_tables
  failed_when: false

- name: Verify tables exist in orders-db
  shell: |
    TABLES=$(docker exec orders-db sh -c "mysql -uroot -proot orders-db -e 'SHOW TABLES'" 2>/dev/null)
    echo "$TABLES"
    if echo "$TABLES" | grep -q "orders"; then
      echo "Orders table already exists"
    else
      echo "Creating orders table..."
      docker exec -i orders-db sh -c "mysql -uroot -proot orders-db" < {{ docker_compose_dir }}/init-orders-db.sql
    fi
  register: ordersdb_tables
  failed_when: false

- name: Start microservice app containers with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    remove_orphans: true
    services: "{{ microservices_config | dict2items | map(attribute='value.instances') | flatten | map(attribute='container_name') | list }}"
  register: compose_apps_output

- name: Display app compose output
  debug:
    var: compose_apps_output
  when: compose_apps_output is defined

- name: Wait for microservices to be healthy
  wait_for:
    port: "{{ item }}"
    delay: 5
    timeout: 60
  loop: "{{ microservices_config | dict2items | map(attribute='value.instances') | flatten | map(attribute='port') | list }}"
