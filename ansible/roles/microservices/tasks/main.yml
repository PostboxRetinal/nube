# =============================================================================
# Microservices Role - Tasks
# =============================================================================

---
- name: Create microservices directory
  file:
    path: "{{ docker_compose_dir }}"
    state: directory
    mode: '0755'
    owner: vagrant
    group: vagrant

- name: Deploy Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: vagrant
    group: vagrant
  notify: Restart microservices

- name: Create Docker network
  docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: Force pull updated microservices images
  docker_image:
    name: "{{ item.value.image }}"
    source: pull
    force_source: true
  loop: "{{ microservices_config | dict2items }}"

- name: Stop and remove existing containers
  shell: |
    docker compose -f {{ docker_compose_dir }}/docker-compose.yml down -v --remove-orphans || true
  args:
    executable: /bin/bash

- name: Start microservices with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    remove_orphans: true
  register: compose_output

- name: Display Docker Compose output
  debug:
    var: compose_output
  when: compose_output is defined

- name: Wait for Docker Compose to complete
  pause:
    seconds: 30

- name: Ensure app_users exists in users_db
  shell: |
    docker exec users_db sh -c "mysql -uroot -proot -e \"CREATE USER IF NOT EXISTS 'app_users'@'localhost' IDENTIFIED BY 'app_password'; CREATE USER IF NOT EXISTS 'app_users'@'%' IDENTIFIED BY 'app_password'; GRANT ALL PRIVILEGES ON users_db.* TO 'app_users'@'localhost'; GRANT ALL PRIVILEGES ON users_db.* TO 'app_users'@'%'; FLUSH PRIVILEGES;\""
  args:
    executable: /bin/bash
  register: users_db_user_result
  changed_when: "'Granting' in users_db_user_result.stdout"
  failed_when: false

- name: Initialize users schema in users_db
  shell: |
    docker exec users_db sh -c "mysql -uapp_users -papp_password users_db -e \"CREATE TABLE IF NOT EXISTS users (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(100) NOT NULL, email VARCHAR(100) NOT NULL UNIQUE, username VARCHAR(100) NOT NULL UNIQUE, password VARCHAR(100) NOT NULL);\""
  args:
    executable: /bin/bash

- name: Ensure app_products exists in products_db
  shell: |
    docker exec products_db sh -c "mysql -uroot -proot -e \"CREATE USER IF NOT EXISTS 'app_products'@'localhost' IDENTIFIED BY 'app_password'; CREATE USER IF NOT EXISTS 'app_products'@'%' IDENTIFIED BY 'app_password'; GRANT ALL PRIVILEGES ON products_db.* TO 'app_products'@'localhost'; GRANT ALL PRIVILEGES ON products_db.* TO 'app_products'@'%'; FLUSH PRIVILEGES;\""
  args:
    executable: /bin/bash
  register: products_db_user_result
  changed_when: "'Granting' in products_db_user_result.stdout"
  failed_when: false

- name: Initialize products schema in products_db
  shell: |
    docker exec products_db sh -c "mysql -uapp_products -papp_password products_db -e \"CREATE TABLE IF NOT EXISTS products (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(255) NOT NULL, description TEXT NULL, price DECIMAL(10,2) NOT NULL, stock INT NOT NULL);\""
  args:
    executable: /bin/bash

- name: Ensure app_orders exists in orders_db
  shell: |
    docker exec orders_db sh -c "mysql -uroot -proot -e \"CREATE USER IF NOT EXISTS 'app_orders'@'localhost' IDENTIFIED BY 'app_password'; CREATE USER IF NOT EXISTS 'app_orders'@'%' IDENTIFIED BY 'app_password'; GRANT ALL PRIVILEGES ON orders_db.* TO 'app_orders'@'localhost'; GRANT ALL PRIVILEGES ON orders_db.* TO 'app_orders'@'%'; FLUSH PRIVILEGES;\""
  args:
    executable: /bin/bash
  register: orders_db_user_result
  changed_when: "'Granting' in orders_db_user_result.stdout"
  failed_when: false

- name: Initialize orders schema in orders_db
  shell: |
    docker exec orders_db sh -c "mysql -uapp_orders -papp_password orders_db -e \"CREATE TABLE IF NOT EXISTS orders (id VARCHAR(36) PRIMARY KEY, user_id INT NOT NULL, total DECIMAL(10,2) NOT NULL, created_at DATETIME NOT NULL); CREATE TABLE IF NOT EXISTS order_items (id INT AUTO_INCREMENT PRIMARY KEY, order_id VARCHAR(36) NOT NULL, product_id INT NOT NULL, quantity INT NOT NULL, subtotal DECIMAL(10,2) NOT NULL, CONSTRAINT fk_order_items_order FOREIGN KEY (order_id) REFERENCES orders(id) ON DELETE CASCADE);\""
  args:
    executable: /bin/bash

- name: Wait for microservices to be healthy
  wait_for:
    port: "{{ item }}"
    delay: 5
    timeout: 60
  loop: "{{ microservices_config | dict2items | map(attribute='value.instances') | flatten | map(attribute='port') | list }}"