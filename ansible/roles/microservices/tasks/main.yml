# =============================================================================
# Microservices Role - Tasks
# =============================================================================

---
- name: Create microservices directory
  file:
    path: "{{ docker_compose_dir }}"
    state: directory
    mode: '0755'
    owner: vagrant
    group: vagrant

- name: Deploy Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: vagrant
    group: vagrant
  notify: Restart microservices

- name: Create Docker network
  docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: Pull Docker images
  docker_image:
    name: "{{ item.value.image }}"
    source: pull
  loop: "{{ microservices_config | dict2items }}"

- name: Start microservices with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    remove_orphans: true
  register: compose_output

- name: Display Docker Compose output
  debug:
    var: compose_output
  when: compose_output is defined

- name: Initialize users schema in users_db
  shell: |
    docker exec users_db sh -c "mysql -uroot -proot users_db -e \"CREATE TABLE IF NOT EXISTS users (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(100) NOT NULL, email VARCHAR(100) NOT NULL UNIQUE, username VARCHAR(100) NOT NULL UNIQUE, password VARCHAR(100) NOT NULL);\""
  args:
    executable: /bin/bash

- name: Initialize products schema in products_db
  shell: |
    docker exec products_db sh -c "mysql -uroot -proot products_db -e \"CREATE TABLE IF NOT EXISTS products (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(255) NOT NULL, description TEXT NULL, price DECIMAL(10,2) NOT NULL, stock INT NOT NULL);\""
  args:
    executable: /bin/bash

- name: Initialize orders schema in orders_db
  shell: |
    docker exec orders_db sh -c "mysql -uroot -proot orders_db -e \"CREATE TABLE IF NOT EXISTS orders (id VARCHAR(36) PRIMARY KEY, user_id INT NOT NULL, total DECIMAL(10,2) NOT NULL, created_at DATETIME NOT NULL); CREATE TABLE IF NOT EXISTS order_items (id INT AUTO_INCREMENT PRIMARY KEY, order_id VARCHAR(36) NOT NULL, product_id INT NOT NULL, quantity INT NOT NULL, subtotal DECIMAL(10,2) NOT NULL, CONSTRAINT fk_order_items_order FOREIGN KEY (order_id) REFERENCES orders(id) ON DELETE CASCADE);\""
  args:
    executable: /bin/bash

- name: Wait for microservices to be healthy
  wait_for:
    port: "{{ item }}"
    delay: 5
    timeout: 60
  loop: "{{ microservices_config | dict2items | map(attribute='value.instances') | flatten | map(attribute='port') | list }}"