  namespace: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: bastianb001/users-svc:latest
          ports:
            - containerPort: 3001
          env:
            - name: MYSQL_HOST
              value: "users-db"
            - name: DB_HOST
              value: "users-db"
            - name: DATABASE_HOST
              value: "users-db"
            - name: MYSQL_USER
              value: "app-users"
            - name: MYSQL_PASSWORD
              value: "app-password"
            - name: MYSQL_DB
              value: "users-db"
            - name: MYSQL_DATABASE
              value: "users-db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
