---
apiVersion: batch/v1
kind: Job
metadata:
  name: users-db-init
  namespace: webapp
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-client
          image: mysql:8.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mysqladmin ping -h users-db -uroot -papp-password --silent; do
                echo "Waiting for users-db"
                sleep 2
              done
              mysql -h users-db -uroot -papp-password <<'SQL'
              CREATE DATABASE IF NOT EXISTS `users-db`;
              CREATE USER IF NOT EXISTS 'app-users'@'%' IDENTIFIED BY 'app-password';
              GRANT ALL PRIVILEGES ON `users-db`.* TO 'app-users'@'%';
              USE `users-db`;
              CREATE TABLE IF NOT EXISTS users (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  name VARCHAR(100) NOT NULL,
                  email VARCHAR(100) NOT NULL UNIQUE,
                  username VARCHAR(100) NOT NULL UNIQUE,
                  password VARCHAR(100) NOT NULL
              );
              FLUSH PRIVILEGES;
              SQL
