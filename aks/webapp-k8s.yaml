---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: users-db
  namespace: webapp
spec:
  serviceName: users-db
  replicas: 1
  selector:
    matchLabels:
      app: users-db
  template:
    metadata:
      labels:
        app: users-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "app-password"
            - name: MYSQL_DATABASE
              value: "users-db"
            - name: MYSQL_USER
              value: "app-users"
            - name: MYSQL_PASSWORD
              value: "app-password"
          volumeMounts:
            - name: users-db-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: users-db-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        storageClassName: default
---
apiVersion: v1
kind: Service
metadata:
  name: users-db
  namespace: webapp
spec:
  type: ClusterIP
  selector:
    app: users-db
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
