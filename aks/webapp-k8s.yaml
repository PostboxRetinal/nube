              GRANT ALL PRIVILEGES ON `products-db`.* TO 'app-products'@'%';
              USE `products-db`;
              CREATE TABLE IF NOT EXISTS products (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  name VARCHAR(255) NOT NULL,
                  description TEXT NULL,
                  price DECIMAL(10,2) NOT NULL,
                  stock INT NOT NULL
              );
              FLUSH PRIVILEGES;
              SQL
---
apiVersion: batch/v1
kind: Job
metadata:
  name: orders-db-init
  namespace: webapp
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-client
          image: mysql:8.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mysqladmin ping -h orders-db -uroot -papp-password --silent; do
                echo "Waiting for orders-db"
                sleep 2
              done
              mysql -h orders-db -uroot -papp-password <<'SQL'
              CREATE DATABASE IF NOT EXISTS `orders-db`;
              CREATE USER IF NOT EXISTS 'app-orders'@'%' IDENTIFIED BY 'app-password';
              GRANT ALL PRIVILEGES ON `orders-db`.* TO 'app-orders'@'%';
              USE `orders-db`;
              CREATE TABLE IF NOT EXISTS orders (
                  id VARCHAR(36) PRIMARY KEY,
                  user_id INT NOT NULL,
                  total DECIMAL(10,2) NOT NULL,
                  created_at DATETIME NOT NULL
              );
              CREATE TABLE IF NOT EXISTS order_items (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  order_id VARCHAR(36) NOT NULL,
                  product_id INT NOT NULL,
                  quantity INT NOT NULL,
                  subtotal DECIMAL(10,2) NOT NULL,
                  CONSTRAINT fk_order_items_order FOREIGN KEY (order_id) REFERENCES orders(id) ON DELETE CASCADE
              );
              FLUSH PRIVILEGES;
              SQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deploy
  namespace: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: bastianb001/users-svc:latest
          ports:
            - containerPort: 3001
          env:
            - name: MYSQL_HOST
              value: "users-db"
            - name: DB_HOST
              value: "users-db"
            - name: DATABASE_HOST
              value: "users-db"
            - name: MYSQL_USER
              value: "app-users"
            - name: MYSQL_PASSWORD
              value: "app-password"
            - name: MYSQL_DB
              value: "users-db"
            - name: MYSQL_DATABASE
              value: "users-db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
