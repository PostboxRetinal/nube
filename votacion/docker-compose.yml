version: "3"

services:
  vote:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - type: bind
        source: /home/vagrant/votacion/html
        target: /usr/share/nginx/html
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  redis:
    image: redis:alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  result:
    image: result-app:v1
    ports:
      - "8082:80"
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
