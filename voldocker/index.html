<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Sitio Minimalista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #333333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        main {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        nav {
            margin-top: 3rem;
        }

        .nav-link {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            border-radius: 2px;
        }

        .nav-link:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            main {
                padding: 2rem 1.5rem;
            }

            .nav-link {
                padding: 0.875rem 2rem;
                font-size: 0.9375rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenido prueba</h1>
    </header>

    <main>
        <nav>
            <a href="pagina1.html" class="nav-link">Ir a Página 1</a>
        </nav>
    </main>
</body>
</html>
