<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Web 1 - NGINX</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #2f3f4f;
      --accent: #2a6efd;
      --muted: #6f7e8f;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); display: grid; place-items: center; padding: 20px; }
    .panel { width: min(560px, 100%); background: var(--card); border-radius: 16px; padding: 32px 28px; box-shadow: 0 12px 30px rgba(7, 17, 34, 0.08); text-align: center; }
    h1 { margin: 0 0 8px; font-size: 1.8rem; letter-spacing: 0.01em; }
    .badge { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--accent); color: white; font-weight: 600; font-size: 0.9rem; border-radius: 999px; padding: 0.6rem 1.1rem; }
    p { margin: 14px 0 0; color: var(--muted); font-size: 1rem; }
    strong { color: var(--text); }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Servidor Web 1</h1>
    <span class="badge">NGINX</span>
    <p>Ruta raíz — <strong>/</strong></p>
  </section>
</body>
</html>
