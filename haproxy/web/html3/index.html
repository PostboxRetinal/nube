<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Servidor Web 3</title>
	<style>
		:root {
			--bg-1: #f8fbff;
			--bg-2: #eaf4ff;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #526072;
			--accent: #0f6cbd;
			--accent-soft: #d7e9ff;
			--ring: rgba(15, 108, 189, 0.18);
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 20% 20%, #ffffff 0%, transparent 40%),
				radial-gradient(circle at 80% 10%, #dbeeff 0%, transparent 35%),
				linear-gradient(135deg, var(--bg-1), var(--bg-2));
			padding: 24px;
		}

		.panel {
			width: min(680px, 100%);
			background: var(--card);
			border: 1px solid #e7eef7;
			border-radius: 20px;
			padding: 34px 30px;
			text-align: center;
			box-shadow:
				0 10px 30px rgba(31, 41, 55, 0.1),
				0 0 0 6px var(--ring);
			animation: rise 650ms ease-out;
		}

		.badge {
			display: inline-block;
			padding: 8px 14px;
			border-radius: 999px;
			background: var(--accent-soft);
			color: var(--accent);
			font-weight: 700;
			font-size: 0.9rem;
			letter-spacing: 0.02em;
		}

		h1 {
			margin: 14px 0 8px;
			font-size: clamp(1.8rem, 4.5vw, 2.6rem);
			line-height: 1.2;
		}

		p {
			margin: 0;
			color: var(--muted);
			font-size: 1.05rem;
		}

		.status {
			margin-top: 18px;
			font-weight: 700;
			color: #0a7f3f;
		}

		@keyframes rise {
			from { opacity: 0; transform: translateY(14px) scale(0.99); }
			to { opacity: 1; transform: translateY(0) scale(1); }
		}
	</style>
</head>
<body>
	<main class="panel">
		<span class="badge">HAProxy Demo</span>
		<h1>Bienvenidos al Servidor Web 3</h1>
		<p>Esta instancia esta lista para recibir trafico y responder solicitudes.</p>
		<p class="status">Estado: Activo</p>
	</main>
</body>
</html>
