services:

  consul_init:
    image: hashicorp/consul:1.22.3
    restart: "no"
    container_name: consul_init
    command: >-
      sh -c "[ -f /consul/secrets/gossip.key ] || (consul keygen > /consul/secrets/gossip.key && chmod 644 /consul/secrets/gossip.key)"
    volumes:
      - consul_secrets:/consul/secrets

  micros_registrar:
    image: curlimages/curl:latest
    container_name: micros_registrar
    restart: "no"
    networks:
      - infra
    depends_on:
      consul:
        condition: service_healthy
      vsftpd:
        condition: service_healthy
      micro_users:
        condition: service_healthy
      micro_products:
        condition: service_healthy
      frontend:
        condition: service_healthy
      db:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    environment:
      - CONSUL_HTTP_TOKEN=${CONSUL_HTTP_TOKEN:-}
      - TO_REGISTER=${TO_REGISTER:-}
    command: >-
      sh -c '
      for item in $$TO_REGISTER; do
        # split tuple on colon using IFS and set
        OLDIFS=$$IFS; IFS=":"; set -- $$item; IFS=$$OLDIFS;
        id=$$1; name=$$2; addr=$$3; port=$$4;
        echo "waiting for $$addr:$$port to be reachable...";
        while ! nc -z $$addr $$port; do sleep 1; done;
        echo "Registering $$id with Consul...";
        curl -s -X PUT \
          -H "Content-Type: application/json" \
          -H "X-Consul-Token:$$$$CONSUL_HTTP_TOKEN" \
          -d "{\"ID\":\"$$id\",\"Name\":\"$$name\",\"Address\":\"$$addr\",\"Port\":$$port,\"Check\":{\"TCP\":\"$$addr:$$port\",\"Interval\":\"15s\",\"Timeout\":\"5s\"}}" \
          http://consul:8500/v1/agent/service/register &&
        echo "201/OK $$id registered ;)";
      done
      '

  consul:
    image: hashicorp/consul:1.22.3
    container_name: consul
    hostname: consul-server-1
    restart: unless-stopped
    depends_on:
        consul_init:
          condition: service_completed_successfully

    command: >-
      sh -c "consul agent -server -bootstrap-expect=1 -node=consul-server-1 -bind=0.0.0.0 -client=0.0.0.0 -ui -data-dir=/consul/data -config-dir=/consul/config -log-level=INFO -encrypt=$(cat /consul/secrets/gossip.key)"

    ports:
      - "${CONSUL_HTTP_PORT:-8500}:8500" 
      - "${CONSUL_DNS_PORT:-8600}:8600/tcp"
      - "${CONSUL_DNS_PORT:-8600}:8600/udp"

    volumes:
      - consul_data:/consul/data 
      - consul_secrets:/consul/secrets:ro 

    environment:
      - CONSUL_BIND_INTERFACE=eth0
      - CONSUL_HTTP_TOKEN=${CONSUL_HTTP_TOKEN:-}

    networks:
      - infra

    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
      - IPC_LOCK

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  vsftpd:
    image: fauria/vsftpd:latest
    container_name: vsftpd
    restart: unless-stopped

    ports:
      - "${FTP_PORT:-21}:21" 
      - "${FTP_PASV_MIN:-21100}-${FTP_PASV_MAX:-21110}:21100-21110"

    environment:
      FTP_USER: ${FTP_USER:-ftpuser}
      FTP_PASS: ${FTP_PASS:-changeme}
      PASV_ADDRESS: ${PASV_ADDRESS:-192.168.121.6}
      PASV_MIN_PORT: ${FTP_PASV_MIN:-21100}
      PASV_MAX_PORT: ${FTP_PASV_MAX:-21110}
      ANONYMOUS_ENABLE: "NO"
      CHROOT_LOCAL_USER: "YES"
      ALLOW_WRITEABLE_CHROOT: "YES"
      WRITE_ENABLE: "YES"
      LOCAL_UMASK: "022"
      XFERLOG_ENABLE: "YES"
      LOG_STDOUT: "YES" 

    volumes:
      - ftp_data:/home/vsftpd
      - ftp_logs:/var/log/vsftpd

    networks:
      - infra

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/21' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M

    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - SYS_CHROOT
      - CHOWN
      - FOWNER

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:false  # vsftpd must be able to setuid; keep false.

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Servicios REST
  db:
    image: mysql:5.7
    container_name: rest_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./REST/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./REST/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/3306' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  micro_users:
    build:
      context: ./REST/microUsers
      dockerfile: Dockerfile
    container_name: micro_users
    ports:
      - "${MICRO_USERS_PORT:-5002}:5002"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DB=${MYSQL_DATABASE:-myflaskapp}
      - API_USERS_PORT=${MICRO_USERS_PORT:-5002}
    networks:
      - infra
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5002' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  micro_products:
    build:
      context: ./REST/microProducts
      dockerfile: Dockerfile
    container_name: micro_products
    ports:
      - "${MICRO_PRODUCTS_PORT:-5003}:5003"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DB=${MYSQL_DATABASE:-myflaskapp}
      - API_PRODUCTS_PORT=${MICRO_PRODUCTS_PORT:-5003}
    networks:
      - infra
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5003' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./REST/frontend
      dockerfile: Dockerfile
    container_name: rest_frontend
    ports:
      - "${FRONTEND_PORT:-5001}:5001"
    environment:
      - API_USERS_PORT=${MICRO_USERS_PORT:-5002}
      - API_PRODUCTS_PORT=${MICRO_PRODUCTS_PORT:-5003}
    networks:
      - infra
    depends_on:
      - micro_users
      - micro_products
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5001' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
  fastapi:
    build: ./awesome-compose/fastapi/
    container_name: fastapi
    environment:
      PORT: ${FASTAPI_PORT:-8000}
    ports:
      - "${FASTAPI_PORT:-8000}:${FASTAPI_PORT:-8000}"
    restart: "no"
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:

  consul_data:
    driver: local

  consul_secrets:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/consul_secrets

  ftp_data:
    driver: local

  ftp_logs:
    driver: local

  db_data:
    driver: local

networks:
  infra:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
