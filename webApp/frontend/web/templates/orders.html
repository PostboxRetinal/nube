<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { padding-top: 50px; padding-bottom: 20px; }
        .navbar { margin-bottom: 20px; }
        .form-container { max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">Store Management</a>
</nav>

<div class="container mt-5">
    <div class="form-container">
        <h2>Create New Order</h2>
        <form id="add-order-form">
            <div class="form-group">
                <label for="product_id">Product ID</label>
                <input type="number" class="form-control" id="product_id" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" class="form-control" id="quantity" required>
            </div>
            <button type="button" class="btn btn-primary" onclick="createOrder()">Create Order</button>
        </form>
    </div>

    <h2 class="mt-4">Orders List</h2>
    <table id="order-list" class="table table-striped">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>User / Session</th>
                <th>Product ID</th>
                <th>Quantity</th>
                <th>Total ($)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button type="button" class="btn btn-secondary" onclick="getOrders()">Refresh Orders</button>
</div>

<script>
  const PORT_USERS = "{{ PORT_USERS }}";
  const PORT_PRODUCTS = "{{ PORT_PRODUCTS }}";
  const PORT_ORDERS = "{{ PORT_ORDERS }}";
</script>
<script src="/static/scriptOrders.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        getOrders();
    });
</script>
</body>
</html>
