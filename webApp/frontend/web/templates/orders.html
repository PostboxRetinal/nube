<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders History</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { padding-top: 50px; padding-bottom: 20px; }
        .navbar { margin-bottom: 20px; }
        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .order-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: #6c757d;
            cursor: help;
        }
        .items-row td {
            background-color: #f8f9fa;
            padding: 0 !important;
        }
        .items-table {
            margin: 0;
            font-size: 0.875rem;
        }
        .items-table th {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">Store Management</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse"
        aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="/products">Products Store</a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" href="/orders">Orders History</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="action-header">
        <h2>Orders History</h2>
        <a href="/products" class="btn btn-success">Go to Products to Create Order</a>
    </div>

    <table id="order-list" class="table table-striped table-hover">
        <thead class="thead-dark">
            <tr>
                <th>Order ID</th>
                <th>User</th>
                <th>Total ($)</th>
                <th>Created At</th>
                <th>Items</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button type="button" class="btn btn-secondary" onclick="getOrders()">Refresh Orders</button>
</div>

<script>
    const PORT_USERS = "{{ PORT_USERS }}";
    const PORT_PRODUCTS = "{{ PORT_PRODUCTS }}";
    const PORT_ORDERS = "{{ PORT_ORDERS }}";
</script>
<script src="/static/scriptOrders.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        getOrders();
    });
</script>
</body>
</html>
